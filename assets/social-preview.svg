<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="50%" style="stop-color:#161b22"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c4dff"/>
      <stop offset="100%" style="stop-color:#00e5ff"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c4dff;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#00e5ff;stop-opacity:0.1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.06">
    <line x1="0" y1="0" x2="1280" y2="640" stroke="#7c4dff" stroke-width="0.5"/>
    <line x1="0" y1="640" x2="1280" y2="0" stroke="#00e5ff" stroke-width="0.5"/>
    <line x1="640" y1="0" x2="640" y2="640" stroke="#7c4dff" stroke-width="0.5"/>
    <line x1="0" y1="320" x2="1280" y2="320" stroke="#00e5ff" stroke-width="0.5"/>
    <line x1="320" y1="0" x2="320" y2="640" stroke="#7c4dff" stroke-width="0.3"/>
    <line x1="960" y1="0" x2="960" y2="640" stroke="#00e5ff" stroke-width="0.3"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="180" cy="320" r="220" fill="url(#glow)" opacity="0.4"/>
  <circle cx="1100" cy="300" r="260" fill="url(#glow)" opacity="0.3"/>

  <!-- Network nodes -->
  <g opacity="0.1" stroke="#00e5ff" stroke-width="1" fill="none">
    <circle cx="150" cy="150" r="4" fill="#00e5ff"/>
    <circle cx="250" cy="100" r="3" fill="#7c4dff"/>
    <circle cx="200" cy="200" r="3" fill="#7c4dff"/>
    <line x1="150" y1="150" x2="250" y2="100"/>
    <line x1="150" y1="150" x2="200" y2="200"/>
    <line x1="250" y1="100" x2="200" y2="200"/>

    <circle cx="1050" cy="450" r="4" fill="#00e5ff"/>
    <circle cx="1150" cy="400" r="3" fill="#7c4dff"/>
    <circle cx="1100" cy="520" r="3" fill="#7c4dff"/>
    <circle cx="1180" cy="500" r="3" fill="#00e5ff"/>
    <line x1="1050" y1="450" x2="1150" y2="400"/>
    <line x1="1050" y1="450" x2="1100" y2="520"/>
    <line x1="1150" y1="400" x2="1180" y2="500"/>
    <line x1="1100" y1="520" x2="1180" y2="500"/>
  </g>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1280" height="3" fill="url(#accent)"/>

  <!-- Canton logo text -->
  <text x="640" y="170" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#8b949e" text-anchor="middle" letter-spacing="6" font-weight="300">
    CANTON NETWORK
  </text>

  <!-- Main title -->
  <text x="640" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="60" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="-1">
    DeFi Primitives
  </text>

  <!-- Subtitle -->
  <text x="640" y="290" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#8b949e" text-anchor="middle" letter-spacing="0.5">
    Open-source DAML contracts for institutional digital asset trading
  </text>

  <!-- Divider -->
  <rect x="540" y="320" width="200" height="2" fill="url(#accent)" rx="1"/>

  <!-- Tags -->
  <g font-family="system-ui, -apple-system, sans-serif" font-size="15">
    <rect x="215" y="355" width="110" height="30" rx="15" fill="#7c4dff" opacity="0.2"/>
    <text x="270" y="375" fill="#7c4dff" text-anchor="middle">OTC Trading</text>

    <rect x="340" y="355" width="80" height="30" rx="15" fill="#00e5ff" opacity="0.2"/>
    <text x="380" y="375" fill="#00e5ff" text-anchor="middle">Escrow</text>

    <rect x="435" y="355" width="100" height="30" rx="15" fill="#7c4dff" opacity="0.2"/>
    <text x="485" y="375" fill="#7c4dff" text-anchor="middle">Collateral</text>

    <rect x="550" y="355" width="105" height="30" rx="15" fill="#00e5ff" opacity="0.2"/>
    <text x="602" y="375" fill="#00e5ff" text-anchor="middle">Settlement</text>

    <rect x="670" y="355" width="100" height="30" rx="15" fill="#7c4dff" opacity="0.2"/>
    <text x="720" y="375" fill="#7c4dff" text-anchor="middle">DAML 2.9</text>

    <rect x="785" y="355" width="85" height="30" rx="15" fill="#00e5ff" opacity="0.2"/>
    <text x="827" y="375" fill="#00e5ff" text-anchor="middle">Rust SDK</text>

    <rect x="885" y="355" width="90" height="30" rx="15" fill="#7c4dff" opacity="0.2"/>
    <text x="930" y="375" fill="#7c4dff" text-anchor="middle">GPL v3</text>
  </g>

  <!-- Stats -->
  <g font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">
    <text x="350" y="450" font-size="36" font-weight="700" fill="#ffffff">1,672</text>
    <text x="350" y="475" font-size="14" fill="#8b949e">Lines of DAML</text>

    <text x="540" y="450" font-size="36" font-weight="700" fill="#ffffff">28</text>
    <text x="540" y="475" font-size="14" fill="#8b949e">Contract Choices</text>

    <text x="740" y="450" font-size="36" font-weight="700" fill="#ffffff">50+</text>
    <text x="740" y="475" font-size="14" fill="#8b949e">Invariant Checks</text>

    <text x="930" y="450" font-size="36" font-weight="700" fill="#ffffff">6</text>
    <text x="930" y="475" font-size="14" fill="#8b949e">Test Scenarios</text>
  </g>

  <!-- Quote -->
  <text x="640" y="530" font-family="Georgia, serif" font-size="15" fill="#8b949e" text-anchor="middle" font-style="italic">
    "From OTC to AMM. From Oracle to Settlement. Production-ready. Open-source."
  </text>

  <!-- Bottom info -->
  <text x="640" y="580" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#58a6ff" text-anchor="middle">
    gyberexperiments.github.io/canton-primitives
  </text>

  <!-- GitHub org -->
  <text x="640" y="605" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#484f58" text-anchor="middle">
    GyberExperiments / Gybernaty / Built for Canton Network
  </text>

  <!-- Bottom accent line -->
  <rect x="0" y="637" width="1280" height="3" fill="url(#accent)"/>
</svg>
